name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: App self-test (syntax + core logic smoke)
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -STA -File .\FocusGuard.ps1 -SelfTest

      - name: PSScriptAnalyzer (errors only)
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          if ($issues) {
            $issues | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }

      - name: Pester unit tests
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.5.0
          $result = Invoke-Pester -Path .\tests -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) { exit 1 }
